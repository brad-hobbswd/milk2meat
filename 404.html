<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

</title>

<meta
name="description"
content="Page not found">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#0d1117;
--bg2:#161b22;
--gold:#d9b26c;
--text:#d5d5d5;
--border:#2a2f36;

}

body{

background:var(--bg);

font-family:Georgia,serif;

color:var(--text);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

.card{

max-width:750px;

background:var(--bg2);

padding:60px 45px;

border-radius:25px;

border:
1px solid var(--border);

text-align:center;

box-shadow:
0 15px 40px
rgba(0,0,0,.35);

}

h1{

font-size:clamp(3rem,8vw,6rem);

color:var(--gold);

margin-bottom:20px;

}

h2{

margin-bottom:25px;

font-size:1.7rem;

}

p{

line-height:1.9;

margin-bottom:35px;

font-size:1.05rem;

}

.btn{

display:inline-block;

padding:14px 35px;

background:var(--gold);

color:black;

text-decoration:none;

font-weight:bold;

border-radius:30px;

transition:.4s;

}

.btn:hover{

transform:translateY(-3px);

}

</style>

</head>

<body>

<div class="card">

<h1>

404

</h1>

<h2>

Page Not Found

</h2>

<p>

Looks like this path wandered away from the journey. Growth continues ahead and another road remains open.

</p>

<p>

Continue the journey.

</p>

<a
href="index.html"
class="btn">

Return Home

</a>
